{% static "" %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}{% endblock  %}</title>
</head>
<body>
    <a href="{% url "upload_profile" %}"><button>Upload Profile</button></a>
    <a href="{% url "view_profile" %}"><button>Show Profile</button></a>

    <hr>
    {% if messages %}
        <ul>
            {% for message in messages %}
                <li>{{message}}</li>
            {% endfor %}
        </ul>
    {% endif %}
    
    {% block content %}
     {% endblock %}

</body>
</html>
