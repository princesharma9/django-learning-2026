 {% extends "layout.html" %}
{% block title %}
    Edit Task
{% endblock %}
{% block content %}
    

<div class="container">

    <h1>Edit Tasks</h1>

    <form method="post">
        {% csrf_token %}
        <input type="text" name="task" value = "{{task.task}}" required>

        <button type="submit">Done</button>
    </form>
    
</div>


{% endblock %}
